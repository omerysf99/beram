<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Matematik Yarışması</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

.box {
    margin-top: 50px;
    animation: fadeIn 0.5s;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background-color: gold;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);} 
    to {opacity: 1; transform: translateY(0);} 
}
</style>
</head>
<body>

<div class="box" id="kutu">
    <h1>💰 Matematik Yarışması</h1>
    <h2 id="para">Para: 0 ₺</h2>
    <h3 id="soru"></h3>
    <div id="cevaplar"></div>
    <div id="kontrol"></div>
</div>

<script>

let kolaySorular = [
    {soru:"5 + 3 kaçtır?", cevaplar:[6,7,8,9], dogru:8},
    {soru:"10 - 4 kaçtır?", cevaplar:[5,6,7,8], dogru:6},
    {soru:"6 x 2 kaçtır?", cevaplar:[10,11,12,14], dogru:12},
    {soru:"9 / 3 kaçtır?", cevaplar:[2,3,4,5], dogru:3},
    {soru:"7 + 2 kaçtır?", cevaplar:[8,9,10,11], dogru:9},
    {soru:"8 - 3 kaçtır?", cevaplar:[4,5,6,7], dogru:5},
    {soru:"4 x 2 kaçtır?", cevaplar:[6,7,8,9], dogru:8},
    {soru:"12 / 4 kaçtır?", cevaplar:[2,3,4,5], dogru:3},
    {soru:"15 - 5 kaçtır?", cevaplar:[8,9,10,11], dogru:10}
];

let zorSorular = [
    {soru:"2^5 + 3^3 kaçtır?", cevaplar:[59,61,63,65], dogru:59},
    {soru:"Bir sayının %20'si 40 ise tamamı kaçtır?", cevaplar:[150,180,200,220], dogru:200},
    {soru:"x + 5 = 17 ise x kaçtır?", cevaplar:[10,11,12,13], dogru:12},
    {soru:"(3^2 + 4^2) kaçtır?", cevaplar:[20,25,30,35], dogru:25},
    {soru:"Bir üçgende iç açılar toplamı kaçtır?", cevaplar:[90,180,270,360], dogru:180},
    {soru:"√144 kaçtır?", cevaplar:[10,11,12,13], dogru:12},
    {soru:"5! kaçtır?", cevaplar:[60,100,120,140], dogru:120},
    {soru:"x^2 = 49 ise x kaçtır?", cevaplar:[5,6,7,8], dogru:7},
    {soru:"90 km/s hızla 4 saatte kaç km?", cevaplar:[300,320,360,400], dogru:360},
    {soru:"log10(1000) kaçtır?", cevaplar:[2,3,4,5], dogru:3}
];

let sorular = [];
let index = 0;
let para = 0;

function rastgeleSec(dizi, adet){
    let kopya = [...dizi];
    let secilen = [];
    adet = Math.min(adet, kopya.length);

    for(let i=0;i<adet;i++){
        let rnd = Math.floor(Math.random()*kopya.length);
        secilen.push(kopya.splice(rnd,1)[0]);
    }
    return secilen;
}

function oyunuHazirla(){
    let kolay9 = rastgeleSec(kolaySorular, 9);
    let zor1 = rastgeleSec(zorSorular, 1);

    sorular = kolay9.concat(zor1);

    index = 0;
    para = 0;

    document.getElementById("para").innerText = "Para: 0 ₺";
}

function animasyonYenile(){
    const kutu = document.getElementById("kutu");
    kutu.style.animation = "none";
    kutu.offsetHeight;
    kutu.style.animation = "fadeIn 0.5s";
}

function soruGoster(){
    animasyonYenile();

    document.getElementById("kontrol").innerHTML = "";

    let s = sorular[index];
    document.getElementById("soru").innerText = (index+1) + ". Soru: " + s.soru;

    let cevapDiv = document.getElementById("cevaplar");
    cevapDiv.innerHTML = "";

    s.cevaplar.forEach(c => {
        let btn = document.createElement("button");
        btn.innerText = c;
        btn.onclick = () => cevapKontrol(c);
        cevapDiv.appendChild(btn);
    });
}

function cevapKontrol(secim){
    let s = sorular[index];

    let buttons = document.querySelectorAll("#cevaplar button");
    buttons.forEach(btn => btn.disabled = true);

    // TERS MANTIK DEVAM
    if(secim !== s.dogru){
        para += 1000;
        document.getElementById("para").innerText = "Para: " + para + " ₺";

        if(index === sorular.length - 1){
            alert("Kazandın: " + para);
            return;
        }

        sonrakiSecim();

    } else {
        alert("Yanlış sayıldı 😈 Tüm para gitti!");
        oyunuHazirla();
        soruGoster();
    }
}

function sonrakiSecim(){
    let kontrol = document.getElementById("kontrol");
    kontrol.innerHTML = "<p>Devam?</p>";

    let devamBtn = document.createElement("button");
    devamBtn.innerText = "Devam";
    devamBtn.onclick = () => { index++; soruGoster(); };

    let cekilBtn = document.createElement("button");
    cekilBtn.innerText = "Çekil";
    cekilBtn.onclick = () => {
        document.getElementById("cevaplar").innerHTML = "";
        document.getElementById("kontrol").innerHTML = "";
        document.getElementById("soru").innerHTML = `<div style='border:3px solid gold;padding:20px;background:#222;display:inline-block'>🏆 ÇEK BONO 🏆<br><h2>${para} ₺</h2></div>`;
    };

    kontrol.appendChild(devamBtn);
    kontrol.appendChild(cekilBtn);
}

oyunuHazirla();
soruGoster();

</script>

</body>
</html>
